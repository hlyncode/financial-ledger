spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: transfer-service
          uri: http://localhost:8082
          predicates:
            - Path=/transfers/**
          filters:
            - StripPrefix=1
        - id: account-service
          uri: http://localhost:8083
          predicates:
            - Path=/audit/**
          filters:
            - StripPrefix=1
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:financialLedgerSecretKey2024VeryLongSecretKeyForHS256Algorithm}
  expiration: ${JWT_EXPIRATION:86400000} 
spring.cloud.gateway.redis-rate-limiter:
  replenish-rate: 100
  burst-capacity: 200

resilience4j:
  circuitbreaker:
    instances:
      transferCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      accountCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
