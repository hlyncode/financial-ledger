version: '3.8' 
services:
  postgres: 
    image: postgres:16-alpine
    container_name: ledger-postgres
    environment: 
      POSTGRES_DB: ${DB_NAME:-ledger_db}
      POSTGRES_USER: ${DB_USERNAME:-ledger_user} 
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ledger_secret}
    ports:
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data 
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c wal_level=logical 
        -c default_transaction_isolation=serializable 

  redis: 
    image: redis:7-alpine
    container_name: ledger-redis 
    ports: 
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  zookeeper: 
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ledger-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka: 
    image: confluentinc/cp-kafka:7.5.0 
    container_name: ledger-kafka
    depends_on: [zookeeper] 
    ports: 
      - "9092:9092"
    environment: 
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ledger-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  zipkin:
    image: openzipkin/zipkin:3
    container_name: ledger-zipkin
    ports:
      - "9411:9411"

volumes: 
  postgres_data: